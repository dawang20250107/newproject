# ============================================================
# KXT 系统 nginx 配置片段
# 将以下 location 块插入 kxtshare.cloud 的 443 server{} 中
# （位于现有 location / 之前，nginx 最长前缀匹配会优先走这些块）
# ============================================================

    # ── 财务分析系统 ──────────────────────────────────────────
    location ^~ /caiwu/assets/ {
        alias /opt/caiwu/frontend_dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /caiwu/ {
        alias /opt/caiwu/frontend_dist/;
        try_files $uri $uri/ /caiwu/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 财务分析 API → 同一 gunicorn 8081（与排款系统共用）
    location /api/cw/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6m;
    }

    # ── 排款系统 ──────────────────────────────────────────────
    # 排款前端：带内容哈希的静态资源可长期强缓存（文件名变了才会重新下载）
    location ^~ /paikuan/assets/ {
        alias /opt/paikuan/frontend_dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 排款前端入口 + 路由回退：index.html 绝不缓存，
    # 否则浏览器会一直运行旧的 JS 包，导致新修复（如删除用户、统计筛选）不生效。
    location /paikuan/ {
        alias /opt/paikuan/frontend_dist/;
        try_files $uri $uri/ /paikuan/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 排款后端 API → 本机 8081 (独立于日报系统的 8080)
    location /api/pk/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6m;
    }

# ============================================================
# 完整的 kxtshare.cloud 443 block 参考（仅供对比）：
#
# server {
#     listen 443 ssl;
#     server_name kxtshare.cloud;
#     ...ssl...
#
#     # ← 在这里插入上面三条 location（assets / paikuan / api）
#
#     location / {                          # 日报系统原有，保持不变
#         proxy_pass http://127.0.0.1:8080;
#         ...
#     }
# }
#
# 注意：从旧配置升级时，因为旧的 index.html 曾以 immutable 缓存，
# 用户需强制刷新一次（Ctrl/Cmd+Shift+R）以丢弃浏览器里的旧缓存。
# ============================================================
