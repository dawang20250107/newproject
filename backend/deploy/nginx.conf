# ============================================================
# 排款系统 nginx 配置片段
# 将以下 location 块插入 kxtshare.cloud 的 443 server{} 中
# （位于现有 location / 之前，nginx 最长前缀匹配会优先走这两条）
# ============================================================

    # 排款前端静态文件 → /paikuan/
    location /paikuan/ {
        alias /opt/paikuan/frontend_dist/;
        try_files $uri $uri/ /paikuan/index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # 排款后端 API → 本机 8081 (独立于日报系统的 8080)
    location /api/pk/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

# ============================================================
# 完整的 kxtshare.cloud 443 block 参考（仅供对比）：
#
# server {
#     listen 443 ssl;
#     server_name kxtshare.cloud;
#     ...ssl...
#
#     # ← 在这里插入上面两条 location
#
#     location / {                          # 日报系统原有，保持不变
#         proxy_pass http://127.0.0.1:8080;
#         ...
#     }
# }
# ============================================================
