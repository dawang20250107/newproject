<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻灯片演示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slideshow" id="slideshow">

  <div class="slides-wrapper">

    <section class="slide slide--cover">
      <div class="slide__content">
        <h1>演示标题</h1>
        <p class="subtitle">副标题 · 日期 · 演讲者</p>
      </div>
    </section>

    <section class="slide">
      <div class="slide__content">
        <h2>议程</h2>
        <ul>
          <li>背景介绍</li>
          <li>核心概念</li>
          <li>数据展示</li>
          <li>总结与展望</li>
        </ul>
      </div>
    </section>

    <section class="slide">
      <div class="slide__content">
        <h2>背景介绍</h2>
        <p>在这里输入您的内容。支持 <strong>粗体</strong>、<em>斜体</em> 等基本格式。</p>
        <blockquote>引用文字可以使用 blockquote 标签突出显示。</blockquote>
      </div>
    </section>

    <section class="slide slide--dark">
      <div class="slide__content">
        <h2>核心概念</h2>
        <div class="cards">
          <div class="card">
            <h3>概念一</h3>
            <p>简要说明内容</p>
          </div>
          <div class="card">
            <h3>概念二</h3>
            <p>简要说明内容</p>
          </div>
          <div class="card">
            <h3>概念三</h3>
            <p>简要说明内容</p>
          </div>
        </div>
      </div>
    </section>

    <section class="slide">
      <div class="slide__content">
        <h2>数据展示</h2>
        <div class="chart-placeholder">
          <p>在此处嵌入图表或图片</p>
          <code>&lt;img src="chart.png" alt="图表"&gt;</code>
        </div>
      </div>
    </section>

    <section class="slide slide--cover slide--end">
      <div class="slide__content">
        <h1>谢谢</h1>
        <p class="subtitle">Q &amp; A</p>
      </div>
    </section>

  </div><!-- .slides-wrapper -->

  <!-- 底部控制栏 -->
  <div class="controls">
    <button class="btn-nav btn-prev" id="btnPrev" aria-label="上一张">&#8592;</button>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <span class="page-counter" id="pageCounter">1 / 6</span>

    <button class="btn-nav btn-next" id="btnNext" aria-label="下一张">&#8594;</button>
    <button class="btn-fullscreen" id="btnFullscreen" aria-label="全屏">&#x26F6;</button>
  </div>

</div><!-- .slideshow -->

<script src="script.js"></script>
</body>
</html>
